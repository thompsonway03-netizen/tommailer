appId: com.tommailer.keygen
productName: "TomMailer Keygen"
asar: true
icon: assets/icon.png
extraMetadata:
  main: keygen-app/main.js
directories:
  output: release-keygen
files:
  - keygen-app/**/*
  - assets/icon.png
  - package.json
  - license-db.js
  - licensing.json
  - server.js
  - node_modules/**/*
win:
  target: nsis
  icon: assets/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
